<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>M&A Barber Shop - Servicios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body { visibility: hidden; } /* Oculto hasta que cargue todo */
    </style>
</head>
<body>

    <div id="navbar-container"></div>
    <main id="main-content"></main> <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // 1. Cargar Navbar y Footer desde sus carpetas
            const navRes = await fetch('/componentes/navbar.html');
            document.getElementById('navbar-container').innerHTML = await navRes.text();
            
            const footRes = await fetch('/componentes/footer.html');
            document.getElementById('footer-container').innerHTML = await footRes.text();

            // 2. Cargar el contenido de servicios en main-content
            const mainRes = await fetch('/secciones/servicios.html');
            document.getElementById('main-content').innerHTML = await mainRes.text();

            // 3. Inicializar componentes dinámicos
            inicializarNavbar(); 
            
            // Hacer visible la página
            document.body.style.visibility = 'visible';
        });
    </script>
</body>
</html>
