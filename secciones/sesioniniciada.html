<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>M&A Barber Shop - Servicios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { visibility: hidden; } /* Oculto hasta que cargue todo */
    </style>
</head>
<body>

    <div id="navbar-container"></div>
    <main id="main-content"></main> <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        // Usamos la función que ya existe en script.js
        await cargarComponente('navbar-container', '../componentes/navbar.html');
        await cargarComponente('footer-container', '../componentes/footer.html');
        await cargarComponente('main-content', '../secciones/servicios.html');
        
        // Inicializar
        if (typeof inicializarNavbar === 'function') inicializarNavbar();
        
        document.body.style.visibility = 'visible';
    });
</script>
</body>
</html>
